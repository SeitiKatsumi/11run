services:
  app:
    build: .
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      PUBLIC_BASE_URL: http://localhost:3005
      DATABASE_URL: postgres://11run:11run@db:5432/11run
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: 11run
      POSTGRES_USER: 11run
      POSTGRES_PASSWORD: 11run
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
